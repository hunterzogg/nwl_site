<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorigami — National Wayzata League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css?v=2">
<style>
.stat-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-box { background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 16px 20px; min-width: 160px; }
.stat-box .v { font-family: var(--font-mono); font-size: 1.6rem; color: var(--text); }
.stat-box .l { font-size: 0.75rem; color: var(--text-muted); font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
#gridWrap { position: relative; overflow-x: auto; background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 16px; }
.axis-label {
  font-family: var(--font-display); font-size: 0.75rem; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-muted); text-align: center;
}
#tooltip {
  position: fixed; background: var(--surface-raised); border: 1px solid var(--blue-bright); border-radius: 4px;
  padding: 8px 12px; font-size: 0.8rem; pointer-events: none; display: none; z-index: 200; max-width: 220px;
}
#tooltip .tt-score { font-family: var(--font-mono); font-weight: 600; color: var(--text); }
#tooltip .tt-detail { color: var(--text-muted); margin-top: 2px; }
.note { color: var(--text-muted); font-size: 0.82rem; margin-top: 12px; }
</style>
</head>
<body>

<div class="container" style="padding-top: 24px;">
  <h1 style="margin-bottom: 6px;">Scorigami</h1>
  <p style="color: var(--text-muted); margin-bottom: 24px;">Every final score combination in NWL history. Winning score along the bottom, losing score up the side &mdash; hover any square for detail.</p>

  <div id="statRow" class="stat-row"></div>

  <div id="gridWrap">
    <svg id="grid"></svg>
  </div>
  <p class="note">Every recorded score in league history is shown. Tie games appear on the diagonal.</p>
</div>

<div id="tooltip"></div>

<footer>National Wayzata League &middot; est. 2013</footer>

<script src="../assets/js/shared.js?v=2"></script>
<script>
async function init() {
  const combos = await (isInPagesDir() ?
    fetch('../data/scorigami_combos.json').then(r => r.json()) :
    fetch('data/scorigami_combos.json').then(r => r.json()));

  const allW = combos.map(c => c.w), allL = combos.map(c => c.l);
  const MIN_AXIS = Math.floor(Math.min(...allW, ...allL) / 10) * 10;
  const maxW = Math.ceil(Math.max(...allW) / 10) * 10;
  const maxL = Math.ceil(Math.max(...allL) / 10) * 10;

  const uniqueCount = combos.length;
  const onceCount = combos.filter(c => c.count === 1).length;
  const mostCommon = combos.reduce((a,b) => b.count > a.count ? b : a);
  let highestCombined = combos.reduce((a,b) => (b.w+b.l) > (a.w+a.l) ? b : a);

  document.getElementById('statRow').innerHTML = `
    <div class="stat-box"><div class="v">${uniqueCount}</div><div class="l">Unique scores</div></div>
    <div class="stat-box"><div class="v">${onceCount}</div><div class="l">Happened only once</div></div>
    <div class="stat-box"><div class="v">${mostCommon.w}-${mostCommon.l}</div><div class="l">Most common (${mostCommon.count}&times;)</div></div>
    <div class="stat-box"><div class="v">${highestCombined.w}-${highestCombined.l}</div><div class="l">Highest combined score</div></div>
  `;

  // grid geometry
  const cellSize = 9;
  const cols = maxW - MIN_AXIS + 1;
  const rows = maxL - MIN_AXIS + 1;
  const marginLeft = 40, marginBottom = 30, marginTop = 10, marginRight = 10;
  const plotWidth = cols * cellSize;
  const plotHeight = rows * cellSize;
  const svgWidth = plotWidth + marginLeft + marginRight;
  const svgHeight = plotHeight + marginTop + marginBottom;

  const svg = document.getElementById('grid');
  svg.setAttribute('width', svgWidth);
  svg.setAttribute('height', svgHeight);
  svg.setAttribute('viewBox', `0 0 ${svgWidth} ${svgHeight}`);

  function xPos(w) { return marginLeft + (w - MIN_AXIS) * cellSize; }
  function yPos(l) { return marginTop + (maxL - l) * cellSize; }

  let svgContent = '';

  // axis ticks every 20 points
  for (let w = Math.ceil(MIN_AXIS/20)*20; w <= maxW; w += 20) {
    const x = xPos(w) ;
    svgContent += `<line x1="${x}" y1="${marginTop}" x2="${x}" y2="${marginTop+plotHeight}" stroke="#232E45" stroke-width="0.5"/>`;
    svgContent += `<text x="${x}" y="${marginTop+plotHeight+18}" font-family="IBM Plex Mono" font-size="9" fill="#7C8798" text-anchor="middle">${w}</text>`;
  }
  for (let l = Math.ceil(MIN_AXIS/20)*20; l <= maxL; l += 20) {
    const y = yPos(l);
    svgContent += `<line x1="${marginLeft}" y1="${y}" x2="${marginLeft+plotWidth}" y2="${y}" stroke="#232E45" stroke-width="0.5"/>`;
    svgContent += `<text x="${marginLeft-6}" y="${y+3}" font-family="IBM Plex Mono" font-size="9" fill="#7C8798" text-anchor="end">${l}</text>`;
  }

  // diagonal reference line (winning == losing, ties live here, area below is impossible since winner can't score less than loser)
  svgContent += `<line x1="${xPos(MIN_AXIS)}" y1="${yPos(MIN_AXIS)}" x2="${xPos(maxL > maxW ? maxW : maxW)}" y2="${yPos(MIN_AXIS)}" stroke="#C8102E" stroke-width="0.75" stroke-dasharray="3,3" opacity="0.4"/>`;

  combos.forEach(c => {
    const x = xPos(c.w), y = yPos(c.l);
    const isTie = c.w === c.l;
    const opacity = Math.min(0.4 + c.count * 0.25, 1);
    const color = isTie ? '#C8102E' : '#1E3FCB';
    svgContent += `<rect class="combo-cell" data-w="${c.w}" data-l="${c.l}" data-count="${c.count}"
      data-rs="${c.recent_season}" data-rw="${c.recent_week}" data-winner="${c.recent_winner}" data-loser="${c.recent_loser}"
      x="${x}" y="${y}" width="${cellSize-1}" height="${cellSize-1}" fill="${color}" opacity="${opacity}" rx="1"/>`;
  });

  svgContent += `<text x="${marginLeft+plotWidth/2}" y="${svgHeight-2}" font-family="Oswald" font-size="10" letter-spacing="1" fill="#7C8798" text-anchor="middle" text-transform="uppercase">WINNING SCORE</text>`;

  svg.innerHTML = svgContent;

  // rotated y-axis label
  const yLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  yLabel.setAttribute('x', '12');
  yLabel.setAttribute('y', String(marginTop + plotHeight/2));
  yLabel.setAttribute('font-family', 'Oswald');
  yLabel.setAttribute('font-size', '10');
  yLabel.setAttribute('letter-spacing', '1');
  yLabel.setAttribute('fill', '#7C8798');
  yLabel.setAttribute('text-anchor', 'middle');
  yLabel.setAttribute('transform', `rotate(-90, 12, ${marginTop + plotHeight/2})`);
  yLabel.textContent = 'LOSING SCORE';
  svg.appendChild(yLabel);

  const tooltip = document.getElementById('tooltip');
  svg.querySelectorAll('.combo-cell').forEach(cell => {
    cell.addEventListener('mousemove', (e) => {
      const { w, l, count, rs, rw, winner, loser } = cell.dataset;
      tooltip.innerHTML = `
        <div class="tt-score">${w}-${l}</div>
        <div class="tt-detail">${count}&times; all-time</div>
        <div class="tt-detail">Most recent: ${winner} over ${loser}, Wk${rw} ${rs}</div>
      `;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY + 10) + 'px';
    });
    cell.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });
}

renderNav('scorigami');
init();
</script>
</body>
</html>
